  <script>
    (function () {
      var includeBibtex = true;
      var initialGroupByYear = false;
      var dataNode = document.getElementById("bib2html-data");
      var data = { groupsByYear: [], flatEntries: [] };
      try {
        data = JSON.parse((dataNode && dataNode.textContent) || "{}");
      } catch (error) {
        data = { groupsByYear: [], flatEntries: [] };
      }

      var container = document.querySelector(".bib2html-runtime");
      if (!container) {
        return;
      }

      var toggle = container.querySelector(".b2h-group-toggle");
      var root = container.querySelector(".b2h-root");
      var modal = container.querySelector(".b2h-modal");
      var modalTitle = container.querySelector(".b2h-modal-title");
      var modalPre = container.querySelector(".b2h-pre");
      var copyBtn = container.querySelector(".b2h-icon-btn.copy");
      var closeBtn = container.querySelector(".b2h-icon-btn.close");

      function renderEmpty() {
        root.innerHTML = "<p class='b2h-empty'>No se encontraron entradas bibliográficas válidas.</p>";
      }

      function openModal(id, bibtex) {
        modalTitle.textContent = "Registro BibTeX: " + id;
        modalPre.textContent = bibtex || "";
        modal.setAttribute("aria-hidden", "false");
      }

      function closeModal() {
        modal.setAttribute("aria-hidden", "true");
      }

      async function copyBibtex() {
        var text = modalPre.textContent || "";
        if (!text) {
          return;
        }
        try {
          await navigator.clipboard.writeText(text);
          copyBtn.classList.add("ok");
          setTimeout(function () { copyBtn.classList.remove("ok"); }, 900);
        } catch (error) {
          var textarea = document.createElement("textarea");
          textarea.value = text;
          textarea.setAttribute("readonly", "");
          textarea.style.position = "fixed";
          textarea.style.opacity = "0";
          document.body.appendChild(textarea);
          textarea.select();
          try {
            document.execCommand("copy");
            copyBtn.classList.add("ok");
            setTimeout(function () { copyBtn.classList.remove("ok"); }, 900);
          } finally {
            document.body.removeChild(textarea);
          }
        }
      }

      closeBtn.addEventListener("click", closeModal);
      copyBtn.addEventListener("click", copyBibtex);
      modal.addEventListener("click", function (event) {
        if (event.target === modal) {
          closeModal();
        }
      });
      document.addEventListener("keydown", function (event) {
        if (event.key === "Escape") {
          closeModal();
        }
      });

      function createList(entries) {
        var list = document.createElement("ul");
        list.className = "fa-ul b2h-list";
        (entries || []).forEach(function (entry) {
          var li = document.createElement("li");
          li.innerHTML = "<i class='fa-li fa fa-file-lines' aria-hidden='true'></i>";
          var reference = document.createElement("span");
          reference.className = "b2h-ref";
          reference.innerHTML = entry.reference_html || "";
          li.appendChild(reference);
          if (includeBibtex && entry.bibtex) {
            var btn = document.createElement("button");
            btn.type = "button";
            btn.className = "b2h-bib-btn";
            btn.textContent = "Ver BibTeX";
            btn.addEventListener("click", function () {
              openModal(entry.id || "registro", entry.bibtex || "");
            });
            li.appendChild(btn);
          }
          list.appendChild(li);
        });
        return list;
      }

      function renderGrouped(groups) {
        root.innerHTML = "";
        if (!groups || groups.length === 0) {
          renderEmpty();
          return;
        }
        groups.forEach(function (group, index) {
          var details = document.createElement("details");
          details.className = "b2h-group";
          if (index === 0) {
            details.open = true;
          }

          var summary = document.createElement("summary");
          summary.innerHTML = "<span class='b2h-year'>" + (group.year || "s.f.") + "</span>"
            + "<span class='b2h-count'>" + String((group.entries || []).length) + "</span>";
          details.appendChild(summary);
          details.appendChild(createList(group.entries || []));
          root.appendChild(details);
        });
      }

      function refresh() {
        if (toggle.checked) {
          renderGrouped(data.groupsByYear || []);
          return;
        }
        renderGrouped([{ year: "Todas las publicaciones", entries: data.flatEntries || [] }]);
      }

      toggle.checked = !!initialGroupByYear;
      toggle.addEventListener("change", refresh);
      refresh();
    })();
  </script>
